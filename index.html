<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Inflatable Whole-Body Robotic Skin</title>

<!-- ✅ NETWORK OPTIMIZATION -->
<link rel="dns-prefetch" href="//cdn.jsdelivr.net">
<link rel="dns-prefetch" href="//unpkg.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>

<!-- ✅ PRELOAD -->
<link rel="preload" href="static/models/series_model_best.onnx" as="fetch" crossorigin>
<link rel="preload" href="https://unpkg.com/three@0.128.0/build/three.min.js" as="script">

<!-- CSS -->
<link rel="stylesheet" href="static/css/bulma.min.css">
<link rel="stylesheet" href="static/css/index.css">

<!-- Fonts optimized -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet" media="print" onload="this.media='all'">

</head>

<body>

<section class="hero">
  <div class="hero-body has-text-centered">
    <h1 class="title">
      Inflatable Whole-Body Robotic Skin
    </h1>
    <p>Interactive Demo (Optimized)</p>
  </div>
</section>

<!-- =========================
     INTERACTIVE DEMO
========================= -->
<section class="section">
  <div class="container">

    <div id="model-status" class="box has-text-centered">
      Initializing...
    </div>

    <canvas id="demo-canvas" style="width:100%;height:400px;"></canvas>

    <div class="buttons is-centered mt-4">
      <button id="animate-btn" class="button is-primary">Animate</button>
      <button id="reset-btn" class="button">Reset</button>
    </div>

  </div>
</section>

<!-- =========================
     VIDEO (LAZY)
========================= -->
<section class="section">
  <div class="container">
    <iframe loading="lazy"
      width="100%" height="400"
      src="https://www.youtube.com/embed/JkaxUblCGz0">
    </iframe>
  </div>
</section>

<!-- =========================
     SCRIPT (OPTIMIZED)
========================= -->
<script>
(function () {
'use strict';

/* =========================
   SCRIPT LOADER (PROMISE)
========================= */
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

/* =========================
   GLOBAL STATE
========================= */
let scene, camera, renderer, controls;
let session = null;
let modelLoaded = false;
let busy = false;

/* =========================
   STATUS UI
========================= */
function setStatus(text) {
  document.getElementById("model-status").textContent = text;
}

/* =========================
   INIT THREE (FAST FIRST)
========================= */
async function init3D() {

  await Promise.all([
    loadScript("https://unpkg.com/three@0.128.0/build/three.min.js"),
    loadScript("https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js")
  ]);

  const canvas = document.getElementById("demo-canvas");

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(50, 1.5, 0.1, 100);
  camera.position.set(0, 1, 2);

  renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  renderer.setSize(canvas.clientWidth, 400);

  controls = new THREE.OrbitControls(camera, renderer.domElement);

  scene.add(new THREE.GridHelper(2, 10));

  animate();
}

/* =========================
   RENDER LOOP
========================= */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

/* =========================
   ONNX LAZY LOAD
========================= */
async function loadONNX() {
  if (modelLoaded) return;

  setStatus("Loading AI model...");

  try {
    await loadScript("https://cdn.jsdelivr.net/npm/onnxruntime-web@1.16.3/dist/ort.min.js");

    const resp = await fetch("static/models/series_model_best.onnx");
    const buf = await resp.arrayBuffer();

    session = await ort.InferenceSession.create(buf);

    modelLoaded = true;
    setStatus("AI Ready ✓");

  } catch (e) {
    console.error(e);
    setStatus("Demo mode (model failed)");
  }
}

/* =========================
   RUN MODEL
========================= */
async function runModel() {
  if (!modelLoaded || busy) return;

  busy = true;
  try {
    const input = new Float32Array(16);
    const tensor = new ort.Tensor("float32", input, [1,16]);
    await session.run({input: tensor});
  } finally {
    busy = false;
  }
}

/* =========================
   INTERACTION TRIGGER
========================= */
function enableLazyModelLoad() {
  let triggered = false;

  const trigger = async () => {
    if (triggered) return;
    triggered = true;

    await loadONNX();
    runModel();
  };

  window.addEventListener("click", trigger, {once:true});
  window.addEventListener("touchstart", trigger, {once:true});
}

/* =========================
   BOOT
========================= */
async function boot() {
  setStatus("Initializing 3D...");

  await init3D();

  setStatus("Ready (Demo Mode)");

  enableLazyModelLoad();
}

boot();

})();
</script>

</body>
</html>
